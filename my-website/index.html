<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MySite - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>MySite</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home">
    <h2>Welcome to MySite</h2>
    <p>Your one-stop solution for web services!</p>
    <button onclick="alertUser()">Get Started</button>
  </section>

  <section id="about">
    <h2>About Us</h2>
    <p>We are a team of developers who build simple and effective websites.</p>
  </section>

  <section id="services">
    <h2>Services</h2>
    <ul>
      <li>Web Design</li>
      <li>Web Development</li>
      <li>SEO Optimization</li>
    </ul>
  </section>

  <section id="contact">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your Name" required><br>
      <input type="email" placeholder="Your Email" required><br>
      <textarea placeholder="Your Message" required></textarea><br>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 MySite. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
